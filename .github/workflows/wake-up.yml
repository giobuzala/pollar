# Ping the Render backend periodically so the free-tier instance doesn't spin down
# Without this, the first request after ~15 min of inactivity can take 50+ seconds (cold start)
name: Wake up

on:
  schedule:
    # Every 10 minutes (Render free tier spins down after ~15 min inactivity)
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allow manual run from Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          URL="${RENDER_BACKEND_URL:-https://pollar-pgtu.onrender.com}"
          echo "Pinging $URL/health"
          curl -sf --max-time 120 "$URL/health" && echo " OK" || echo " (request failed or timed out)"
        env:
          RENDER_BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
