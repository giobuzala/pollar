<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b3d6e"/>
      <stop offset="100%" style="stop-color:#2a6496"/>
    </linearGradient>
  </defs>

  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>

  <!-- Just 3 arms (classic snowflake: vertical + two diagonals) -->
  <g stroke="white" stroke-linecap="round" stroke-width="3.5" fill="none">
    <line x1="32" y1="8"    x2="32" y2="56"/>
    <line x1="10.1" y1="20" x2="53.9" y2="44"/>
    <line x1="53.9" y1="20" x2="10.1" y2="44"/>
  </g>

  <!-- One set of branches per arm, short and bold -->
  <g stroke="white" stroke-linecap="round" stroke-width="2.2" fill="none">
    <!-- top branch -->
    <line x1="32" y1="18" x2="25" y2="12"/>
    <line x1="32" y1="18" x2="39" y2="12"/>
    <!-- bottom branch -->
    <line x1="32" y1="46" x2="25" y2="52"/>
    <line x1="32" y1="46" x2="39" y2="52"/>
    <!-- upper-left arm branch -->
    <line x1="19.3" y1="25" x2="12.5" y2="22"/>
    <line x1="19.3" y1="25" x2="20.5" y2="17.5"/>
    <!-- lower-right arm branch -->
    <line x1="44.7" y1="39" x2="51.5" y2="42"/>
    <line x1="44.7" y1="39" x2="43.5" y2="46.5"/>
    <!-- upper-right arm branch -->
    <line x1="44.7" y1="25" x2="51.5" y2="22"/>
    <line x1="44.7" y1="25" x2="43.5" y2="17.5"/>
    <!-- lower-left arm branch -->
    <line x1="19.3" y1="39" x2="12.5" y2="42"/>
    <line x1="19.3" y1="39" x2="20.5" y2="46.5"/>
  </g>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="4" fill="white"/>
</svg>
